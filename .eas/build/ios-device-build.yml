# EAS Custom Build config for code-signed iOS device builds
# ("preview" = internal / ad hoc distribution, "production" = TestFlight / App Store distribution).
#
# なぜ EAS の既定ステップ (npm hooks: eas-build-pre-install / eas-build-post-install) ではなく
# Custom Build を使うか:
# `llama.rn` の Podspec (node_modules/llama.rn/llama-rn.podspec) は
# `s.vendored_frameworks = "ios/rnllama.xcframework"` を指定するが、CocoaPods は
# `pod install` の時点でこの File が存在しないと参照を解決できない (存在しない glob は
# 空扱いになり、later の link 時に undefined symbol になる)。EAS Build の
# `eas-build-post-install` npm hook は iOS では `pod install` の**後**に実行されるため
# 手遅れであり、`eas-build-pre-install` は `npm install` の**前**に実行されるため
# `node_modules/llama.rn` 自体がまだ存在せず失敗する (scripts/setup-llama-native.sh は
# node_modules/llama.rn/install/download-native-artifacts.js に依存する)。
# どちらの npm hook も `npm install` 完了後・`pod install` 実行前という必要な window に
# 一致しないため、Custom Build の Step 順序で明示的にその window へ差し込む。
# 詳細は docs/development/ios-testflight-release.md と
# docs/adr/0031-eas-testflight-automated-release.md を参照する。
#
# `eas/configure_ios_version` を明示的に含める理由:
# eas.json の cli.appVersionSource は "remote"、production.autoIncrement は true にしている
# (buildNumber を EAS サーバ側の台帳で管理し、Git へ書き戻さない設計。ADR-0031 Decision 2)。
# Custom Build では管理ステップ (eas/configure_ios_version) を省略すると、この remote 管理が
# 適用されず、prebuild が生成した Native code の値 (= app.json の ios.buildNumber、常に "1")
# に固定されてしまう。同じ marketing version で 2 回目以降の Build を提出すると buildNumber
# 重複で Apple に reject されるため、既定の入力 (${ eas.job.version.buildNumber } /
# ${ eas.job.version.appVersion }) をそのまま使う `eas/configure_ios_version` を
# `eas/configure_ios_credentials` の直後に置く。
build:
  name: iOS signed device build with llama.rn native artifacts
  steps:
    - eas/checkout

    - eas/install_node_modules

    - eas/resolve_apple_team_id_from_credentials:
        id: resolve_apple_team_id_from_credentials

    - eas/prebuild:
        inputs:
          apple_team_id: ${ steps.resolve_apple_team_id_from_credentials.apple_team_id }

    - run:
        name: Fetch llama.rn native artifacts (before pod install)
        command: make setup-llama-native

    - run:
        name: Install pods
        working_directory: ./ios
        command: pod install

    - eas/configure_ios_credentials

    - eas/configure_ios_version

    - eas/generate_gymfile_from_template:
        inputs:
          credentials: ${ eas.job.secrets.buildCredentials }

    - eas/run_fastlane

    - eas/find_and_upload_build_artifacts
