name: ci

# Supply Chain Security:
# - All actions pinned to full SHA for immutable references
# - Safe Chain runs before dependency installation
# - Lifecycle scripts disabled during install
# - Minimal permissions following principle of least privilege

permissions:
  contents: read
  packages: read
  actions: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        # actions/checkout v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: true

      - name: Setup Bun
        # oven-sh/setup-bun v2.0.2
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76

      - name: Setup Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22.13.1"

      # Supply Chain Security: Setup safe-chain before dependency installation
      # safe-chain 自体のサプライチェイン経由侵入を防ぐため、
      # (1) --ignore-scripts を必ず付ける (Bun は npm_config_ignore_scripts を読まない)
      # (2) version を明示固定する (latest を引かない)
      # version を上げるときは ADR / 別 PR でレビューする。
      - name: Setup safe-chain
        run: |
          bun add -g --ignore-scripts @aikidosec/safe-chain@1.5.3
          safe-chain setup-ci

      # Supply Chain Security: Disable lifecycle scripts during install
      # Note: INSTALL_CI_FLAGS passes --safe-chain-skip-minimum-package-age because
      # direct and transitive dependencies (e.g. the Expo SDK 57 packages) may
      # include recently released packages that have not yet aged out of the
      # safe-chain minimum age check. The flag is understood only by the
      # safe-chain shim, so it is injected here instead of the Makefile default.
      - name: Install packages from frozen bun.lock
        env:
          npm_config_ignore_scripts: "true"
          CI: "true"
        run: make install_ci INSTALL_CI_FLAGS=--safe-chain-skip-minimum-package-age

      - name: Expo Native compatibility
        run: bun run expo:check

      - name: Run quality gates
        run: make before-commit ARCHITECTURE_HARNESS_ARGS=--fail-on=error

      # knip デッドコード検出は報告のみ (ADR-0012)。knip は「この PR で増えた分」ではなく
      # 「現時点の全量」しか出せないため、gate にすると既存負債で新規 PR が落ちて
      # 無視 comment が量産される。job summary へ知らせ、判断は人間が行う。
      # `|| true` は knip 自体の障害で CI を止めないための設計 (advisory)。
      - name: Dead-code scan (knip, report-only)
        run: |
          {
            echo '## Dead-code scan (knip, report-only)'
            echo '```'
            bun run --silent dead-code 2>/dev/null || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
