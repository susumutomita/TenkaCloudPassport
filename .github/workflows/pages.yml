name: pages

# Supply Chain Security:
# - All actions pinned to full SHA for immutable references
# - Minimal permissions following principle of least privilege
# - Deploys site/ (LP + Intro Card viewer) at the root and a built Web Export
#   (Issue 88) at the /app/ sub-path. Web Export is built here (Metro bundling
#   via `bun run build:web`) and never committed to the repository; only the
#   build step below produces `dist/`.
# - Dependency install and Setup safe-chain steps are copied verbatim from
#   ci.yml: Safe Chain scans for malicious/typosquat packages before install,
#   and lifecycle scripts stay disabled (`--ignore-scripts`) throughout. This
#   job holds `pages: write` / `id-token: write`, so it gets the same Supply
#   Chain scanning as ci.yml even though it only builds a static export.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/**'
      - 'App.tsx'
      - 'index.ts'
      - 'app.json'
      - 'package.json'
      - 'bun.lock'
      - 'scripts/prepare-web-app-export.ts'
      - 'scripts/brand-mark-icon.ts'
      - 'scripts/png-encoder.ts'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the code
        # actions/checkout v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Configure GitHub Pages
        # actions/configure-pages v5.0.0
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Setup Bun
        # oven-sh/setup-bun v2.0.2 (pin copied from ci.yml)
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76

      - name: Setup Node.js
        # actions/setup-node v6.4.0 (pin copied from ci.yml; Expo's web export
        # toolchain expects Node.js on PATH alongside Bun, same as ci.yml)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22.13.1"

      # Supply Chain Security: Setup safe-chain before dependency installation
      # (pin and rationale copied verbatim from ci.yml).
      - name: Setup safe-chain
        run: |
          bun add -g --ignore-scripts @aikidosec/safe-chain@1.5.3
          safe-chain setup-ci

      - name: Install packages from frozen bun.lock
        env:
          npm_config_ignore_scripts: "true"
          CI: "true"
        run: make install_ci INSTALL_CI_FLAGS=--safe-chain-skip-minimum-package-age

      - name: Build Web Export
        run: bun run build:web

      - name: Prepare Web Export for /TenkaCloudPassport/app/ (PWA manifest, icons, meta)
        run: bun scripts/prepare-web-app-export.ts dist

      - name: Assemble Pages artifact (site/ at root, Web Export under app/)
        run: |
          mkdir -p pages-dist/app
          cp -r site/. pages-dist/
          cp -r dist/. pages-dist/app/

      - name: Upload Pages artifact
        # actions/upload-pages-artifact v4.0.0
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        # actions/deploy-pages v4.0.5
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
