name: ios-release

# タグ push (v<major>.<minor>.<patch>) を起点に EAS Build → EAS Submit を非対話で実行し、
# TestFlight まで自動で届ける。実際のビルドは GitHub Actions のランナーではなく EAS の
# クラウドビルド環境で完結する。このワークフローの役割は「ビルドを起動するだけ」だが、
# `eas build --non-interactive --auto-submit` はランナー上で app.json の config を評価する
# 際に `plugins`（llama.rn を含む Expo config plugin）を node_modules から解決する必要が
# あるため、ランナー側でも `bun install --ignore-scripts` による依存インストールが要る
# (lifecycle script は不要。native artifact 取得はクラウド側で行うため)。
# llama.rn の Native artifact 取得は EAS クラウドビルド側の Custom Build config
# (.eas/build/ios-simulator-build.yml, .eas/build/ios-device-build.yml) の
# `make setup-llama-native` ステップで、`pod install` の直前に行う (npm hooks の
# eas-build-pre-install / eas-build-post-install はどちらも window が合わない。理由は
# 上記 2 つの yml ファイル内コメントと docs/adr/0031-eas-testflight-automated-release.md を
# 参照する)。GitHub Actions ランナー上でインストールした node_modules は config plugin の
# 解決にのみ使われ、EAS はソースを別途アップロードしてクラウド側で完結してビルドするため、
# ランナー側の node_modules や生成物そのものはビルド成果物には渡らない。
# 詳細は docs/development/ios-testflight-release.md を参照する。
#
# Supply Chain Security:
# - Actions は full SHA へピン (ci.yml から流用)
# - アプリ依存 (node_modules) は safe-chain のセットアップより前に native bun install する。
#   bun.lock で integrity 固定済み・本流 ci.yml でも検証済みのため、safe-chain の
#   minimum package age ゲート対象にする必要がない (対象にすると SDK パッチ整合直後の
#   正当な新パッチ版が誤検知でブロックされる。過去 2 回の実障害を参照)。
# - Safe Chain は eas-cli の global install (新規パッケージ取得) の直前に通し、その保護に scope を絞る
# - permissions は contents: read のみ (GITHUB_TOKEN を使う操作がないため)
# - EXPO_TOKEN Secret が未設定なら fail ではなく明示 skip する
#   (Secrets 投入前に owner の他の push で CI が赤くならないようにするため)

permissions:
  contents: read

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        id: check-secrets
        env:
          EXPO_TOKEN_SET: ${{ secrets.EXPO_TOKEN != '' }}
        run: |
          echo "expo_token_present=$EXPO_TOKEN_SET" >> "$GITHUB_OUTPUT"
          if [ "$EXPO_TOKEN_SET" != "true" ]; then
            echo "::warning::EXPO_TOKEN secret is not set. Skipping EAS Build + Submit. Complete the one-time setup in docs/development/ios-testflight-release.md, then re-run this workflow (workflow_dispatch) or push the tag again."
          fi

      - name: Check out the code
        if: steps.check-secrets.outputs.expo_token_present == 'true'
        # actions/checkout v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        if: steps.check-secrets.outputs.expo_token_present == 'true'
        # oven-sh/setup-bun v2.0.2
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76

      - name: Setup Node.js
        if: steps.check-secrets.outputs.expo_token_present == 'true'
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22.13.1"

      # eas-cli が app.json の config plugins (llama.rn 等) を解決するために node_modules が要る。
      # lifecycle script は不要 (native artifact 取得は EAS クラウド側の Custom Build で行う)。
      # 既存 bun.lock を使い新規解決は増やさない (make install と同じコマンド)。
      # safe-chain のセットアップより前に native bun で install する: bun.lock で
      # integrity 固定済み・ci.yml で検証済みのため safe-chain の minimum package age
      # ゲート対象にする必要がなく、対象にすると SDK パッチ整合直後の正当な新パッチ版が
      # 誤検知でブロックされる (実障害 2 回で確認済み)。
      - name: Install dependencies
        if: steps.check-secrets.outputs.expo_token_present == 'true'
        run: bun install --ignore-scripts

      # Supply Chain Security: eas-cli の global install (新規パッケージ取得) を safe-chain 経由にする。
      # アプリ依存は上のステップで safe-chain を通さずに install 済みのため、ここでの
      # scope は eas-cli の新規 global install の保護に限定される。
      - name: Setup safe-chain
        if: steps.check-secrets.outputs.expo_token_present == 'true'
        run: |
          bun add -g --ignore-scripts @aikidosec/safe-chain@1.5.3
          safe-chain setup-ci

      - name: Trigger EAS Build and submit to TestFlight
        if: steps.check-secrets.outputs.expo_token_present == 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: "true"
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        run: bun run build:ios:testflight
